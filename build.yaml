# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command and `artifact-name` to assign a name to
# distinguish build outputs from each other:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#     shield: corne_left
#     cmake-args: -DCONFIG_ZMK_USB_LOGGING=y
#     artifact-name: corne_left_with_logging
#
---
include:
  # Photon standalone
  - board: photon
    artifact-name: photon
  - board: photon
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: photon_studio

  # Seeed XIAO BLE as the USB central dongle
  - board: xiao_ble
    shield: photon_dongle
    artifact-name: photon_dongle
  - board: xiao_ble
    shield: photon_dongle
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: photon_dongle_studio

  # Settings reset firmware
  - board: xiao_ble
    shield: settings_reset
    artifact-name: dongle_settings_reset
  - board: photon
    shield: settings_reset
    artifact-name: photon_settings_reset

  # Photon as BLE peripheral (for dongle use)
  - board: photon
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n -DCONFIG_ZMK_SLEEP=n -DCONFIG_BT_SETTINGS=n
    artifact-name: photon_peripheral
