# Disable privacy to prevent RPA (Resolvable Private Address) connection tracking issues when dongle re-boots
CONFIG_BT_PRIVACY=n

# Lower settings save debounce from 60s to 1s. This ensures bond data is written to flash immediately
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=1000

# Enable experimental BLE settings for better connection stability with the host PC
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Enable +8dBm TX power for stronger wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
