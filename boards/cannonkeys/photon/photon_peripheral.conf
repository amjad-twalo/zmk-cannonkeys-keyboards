# Photon running as BLE peripheral in dongle-mode split.
# Flash this alongside photon_dongle on xiao_ble.

# Split: peripheral role
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

# Disable sleep — complicates BLE reconnection when the dongle re-plugs
CONFIG_ZMK_SLEEP=n

# Disable USB on the peripheral side
CONFIG_ZMK_USB=n

# Disable underglow — saves battery and reduces BLE data load
CONFIG_ZMK_RGB_UNDERGLOW=n

# BLE connection parameters (must be compatible with dongle side)
CONFIG_BT_MAX_CONN=3
CONFIG_BT_MAX_PAIRED=3
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# Match dongle privacy setting to resolve reconnection issues
CONFIG_BT_PRIVACY=n

# Enable +8dBm TX power for stronger wireless range to the dongle
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
